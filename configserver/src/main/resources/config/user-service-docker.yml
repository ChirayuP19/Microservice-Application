spring:
  data:
    mongodb:
      uri: ${MONGO_URI}
      database: ${MONGO_DB}
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://Zipkin:9411/api/v2/spans
eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
logging:
  level:
    root: INFO
    com.chirayu: TRACE
  file:
    name: logs/user-service.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7
keycloak:
  admin:
    server-url: http://keycloak:8080
    realm: ecom-app
    client-id: admin-cli
    username: admin
    password: admin
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
server:
  port: 8082