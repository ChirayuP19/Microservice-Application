spring:
  data:
    redis:
      host: redis
      port: 6379
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://product:8081
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: ecomBreaker
                fallbackUri: forward:/fallback/products
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@hostNameKeyResolver}"
        - id: user-service
          uri: http://user:8082
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: CircuitBreaker
              args:
                name: ecomBreaker
                fallbackUri: forward:/fallback/users
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@hostNameKeyResolver}"
        - id: order-service
          uri: http://order:8083
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: ecomBreaker
                fallbackUri: forward:/fallback/orders
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@hostNameKeyResolver}"
        - id: cart-service
          uri: http://order:8083
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - name: CircuitBreaker
              args:
                name: ecomBreaker
                fallbackUri: forward:/fallback/orders
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@hostNameKeyResolver}"
        - id: notification-service
          uri: http://notification:8084
          predicates:
              - Path=/api/v1/notifications/**
        - id: eureka-server
          uri: http://eureka:8761
          predicates:
            - Path=/eureka/main
          filters:
            - SetPath=/
        - id: eureka-server-static
          uri: http://eureka:8761
          predicates:
            - Path=/eureka/**
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://Zipkin:9411/api/v2/spans
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://eureka:8761/eureka/
logging:
  level:
    root: INFO
    com.chirayu: TRACE
  file:
    name: logs/product-service.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7
resilience4j:
  circuitbreaker:
    instances:
      ecomBreaker:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        automatic-transition-from-open-to-half-open-enabled: true
        sliding-window-type: COUNT_BASED
server:
  port: 8080