spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB
  RabbitMQ:
    host: localhost
    port: 5672
    username: admin
    password: admin123
  elasticsearch:
    uris: http://localhost:9200
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
logging:
  level:
    root: INFO
    com.chirayu: TRACE
  file:
    name: logs/product-service.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7
server:
  port: 8081