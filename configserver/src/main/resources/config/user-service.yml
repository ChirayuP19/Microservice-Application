spring:
  data:
    mongodb:
      uri: ${DB_URL}
      database: ${DB_DATABASE}
  RabbitMQ:
    host: localhost
    port: 5672
    username: admin
    password: admin123
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
logging:
  level:
    root: INFO
    com.chirayu: TRACE
  file:
    name: logs/user-service.log
  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7
server:
  port: 8082