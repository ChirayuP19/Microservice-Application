services:
  postgres:
    container_name: postgres_container
    image: postgres:14
    environment:
      POSTGRES_DB: ecomdb
      POSTGRES_USER: chirayu
      POSTGRES_PASSWORD: chirayu
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5433:5432"
    networks:
      - postgres
    restart: unless-stopped

  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - postgres
    restart: unless-stopped
    depends_on:
      - postgres

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq_container
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      postgres:

  mongodb:
    container_name: mongo_db
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo:/data
    environment:
      - MONGO_INITDB_ROOT_USERNAME=chirayu
      - MONGO_INITDB_ROOT_PASSWORD=chirayu
    networks:
      - postgres

  mongo-express:
    container_name: mongo_express
    image: mongo-express
    restart: unless-stopped
    ports:
      - "7070:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=chirayu
      - ME_CONFIG_MONGODB_ADMINPASSWORD=chirayu
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
    networks:
      - postgres

  Zipkin:
    image: openzipkin/zipkin
    container_name: Zipkin_container
    ports:
      - "9411:9411"
    networks:
      - postgres

  redis:
    image: redis:latest
    container_name: redis_container
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      postgres:

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: elasticsearch_container
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      postgres:
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_container
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    depends_on:
      - zookeeper
    networks:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper_container
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - postgres
    restart: unless-stopped

  mail-dev:
    container_name: mail_container
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - postgres
    restart: unless-stopped

  keycloak:
    container_name: keycloak_container
    image: quay.io/keycloak/keycloak:24.0.2
    ports:
      - "8443:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      postgres:
    command:
      - "start-dev"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/realms/master" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 80s
    restart: unless-stopped

  config-server:
    build: ./configserver
    container_name: configserver_container
    ports:
      - "8888:8888"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=/config
      - SPRING_PROFILES_ACTIVE=docker,native
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin123
    volumes:
      - ./configserver/src/main/resources/config:/config
    networks:
      postgres:
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 8888 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  eureka:
    build: ./eureka
    container_name: eureka
    ports:
      - "8761:8761"
    networks:
      postgres:
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  gateway-service:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    networks:
      postgres:
    depends_on:
      eureka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped

  user-service:
    build: ./user
    container_name: user
    ports:
      - "8082:8082"
    networks:
      postgres:
    depends_on:
      eureka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin123
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=${MONGO_DB}
    restart: unless-stopped

  product-service:
    build: ./product
    container_name: product
    ports:
      - "8081:8081"
    depends_on:
      eureka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      elasticsearch:
        condition: service_started
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin123
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      postgres:
    restart: unless-stopped

  order-service:
    build: ./order
    container_name: order
    ports:
      - "8083:8083"
    depends_on:
      eureka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin123
      - DB_URL_ORDER=${DB_URL_ORDER}
      - DB_USER_ORDER=${DB_USER_ORDER}
      - DB_PASSWORD_ORDER=${DB_PASSWORD_ORDER}
    networks:
      postgres:
    restart: unless-stopped

  notification-service:
    build: ./notification
    container_name: notification
    ports:
      - "8084:8084"
    depends_on:
      eureka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mail-dev:
        condition: service_started
    environment:
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin123
    networks:
      postgres:
    restart: unless-stopped

networks:
  postgres:
    driver: bridge

volumes:
  postgres:
  pgadmin:
  mongo:
  rabbitmq_data:
  redis_data:
  elasticsearch_data:
  zookeeper_data:
  kafka_data:
  keycloak_data:
